<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OneClerk — Voice AI Receptionist</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: { 950: "#0a0a0b", 900: "#101013", 850: "#15161a", 800: "#1c1d22", 700: "#26272d" },
          accent: { 400: "#5eead4", 500: "#14b8a6", 600: "#0d9488" },
        },
        fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
      },
    },
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { background: #0a0a0b; color: #e5e7eb; font-family: 'Inter', sans-serif; }
  .glass { background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); }
  .pulse-dot { box-shadow: 0 0 0 0 rgba(20,184,166,0.7); animation: pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(20,184,166,0.6);} 70%{box-shadow:0 0 0 10px rgba(20,184,166,0);} 100%{box-shadow:0 0 0 0 rgba(20,184,166,0);} }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #26272d; border-radius: 4px; }
</style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script>
const API = ""; // same origin
const $ = (sel, root=document) => root.querySelector(sel);
const h = (html) => { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; };

const Store = {
  get token() { return localStorage.getItem("oc_token"); },
  set token(v) { v ? localStorage.setItem("oc_token", v) : localStorage.removeItem("oc_token"); },
  get user() { try { return JSON.parse(localStorage.getItem("oc_user") || "null"); } catch { return null; } },
  set user(v) { v ? localStorage.setItem("oc_user", JSON.stringify(v)) : localStorage.removeItem("oc_user"); },
};

async function api(path, { method="GET", body, auth=true } = {}) {
  const headers = { "Content-Type": "application/json" };
  if (auth && Store.token) headers["Authorization"] = `Bearer ${Store.token}`;
  const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (res.status === 401) { Store.token = null; Store.user = null; render(); throw new Error("Unauthorized"); }
  if (!res.ok) {
    let msg = `${res.status}`;
    try { const j = await res.json(); msg = j.detail || msg; } catch {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

// --------- Views ---------
function AuthView() {
  const root = h(`
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md glass rounded-2xl p-8">
      <div class="flex items-center gap-2 mb-6">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-accent-400 to-accent-600 flex items-center justify-center font-bold text-ink-950">O</div>
        <div>
          <div class="font-bold text-lg leading-tight">OneClerk</div>
          <div class="text-xs text-zinc-500">Voice AI Receptionist</div>
        </div>
      </div>
      <div class="flex gap-2 mb-6 text-sm">
        <button data-tab="login" class="tab flex-1 py-2 rounded-lg bg-ink-800 text-white">Log in</button>
        <button data-tab="signup" class="tab flex-1 py-2 rounded-lg text-zinc-400 hover:text-white">Create account</button>
      </div>
      <form id="auth-form" class="space-y-3">
        <input id="name" placeholder="Your name" class="hidden w-full bg-ink-850 border border-ink-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent-500" />
        <input id="email" type="email" required placeholder="Work email" class="w-full bg-ink-850 border border-ink-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent-500" />
        <input id="password" type="password" required placeholder="Password" minlength="6" class="w-full bg-ink-850 border border-ink-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent-500" />
        <button class="w-full py-2.5 rounded-lg bg-accent-500 hover:bg-accent-600 text-ink-950 font-semibold text-sm">Continue</button>
        <div id="auth-err" class="text-xs text-red-400 hidden"></div>
      </form>
      <p class="text-xs text-zinc-500 mt-6 text-center">Your phone rings. OneClerk handles it.</p>
    </div>
  </div>`);

  let mode = "login";
  const nameField = $("#name", root);
  const setMode = (m) => {
    mode = m;
    root.querySelectorAll(".tab").forEach(b => {
      const active = b.dataset.tab === m;
      b.className = `tab flex-1 py-2 rounded-lg ${active ? "bg-ink-800 text-white" : "text-zinc-400 hover:text-white"}`;
    });
    nameField.classList.toggle("hidden", m !== "signup");
    nameField.required = m === "signup";
  };
  root.querySelectorAll(".tab").forEach(b => b.addEventListener("click", e => { e.preventDefault(); setMode(b.dataset.tab); }));

  $("#auth-form", root).addEventListener("submit", async (e) => {
    e.preventDefault();
    const err = $("#auth-err", root); err.classList.add("hidden");
    const body = mode === "signup"
      ? { name: $("#name", root).value, email: $("#email", root).value, password: $("#password", root).value }
      : { email: $("#email", root).value, password: $("#password", root).value };
    try {
      const r = await api(`/auth/${mode}`, { method: "POST", body, auth: false });
      Store.token = r.access_token;
      const me = await api("/auth/me");
      Store.user = me;
      navigate("dashboard");
    } catch (ex) { err.textContent = ex.message; err.classList.remove("hidden"); }
  });
  return root;
}

function Sidebar(active) {
  const items = [
    { id: "dashboard", label: "Dashboard", icon: "M3 12l9-9 9 9M5 10v10h14V10" },
    { id: "agents", label: "Agents", icon: "M12 14l9-5-9-5-9 5 9 5zm0 7v-7" },
    { id: "calls", label: "Recent Calls", icon: "M22 16.92V21a1 1 0 0 1-1.11 1A19.86 19.86 0 0 1 2 4.11 1 1 0 0 1 3 3h4.09a1 1 0 0 1 1 .75l1 4a1 1 0 0 1-.27 1L7 10.91a16 16 0 0 0 6.09 6.09l2.16-1.82a1 1 0 0 1 1-.27l4 1a1 1 0 0 1 .75 1z" },
  ];
  const sb = h(`
    <aside class="w-60 shrink-0 border-r border-ink-800 p-4 flex flex-col">
      <div class="flex items-center gap-2 mb-8 px-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-400 to-accent-600 flex items-center justify-center font-bold text-ink-950">O</div>
        <div class="font-bold">OneClerk</div>
      </div>
      <nav class="space-y-1 text-sm">
        ${items.map(i => `
          <button data-nav="${i.id}" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg ${active===i.id ? "bg-ink-800 text-white" : "text-zinc-400 hover:text-white hover:bg-ink-850"}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${i.icon}"/></svg>
            ${i.label}
          </button>`).join("")}
      </nav>
      <div class="mt-auto pt-4 border-t border-ink-800 text-xs">
        <div class="px-2 mb-2">
          <div class="text-white font-medium truncate">${Store.user?.name || "—"}</div>
          <div class="text-zinc-500 truncate">${Store.user?.email || ""}</div>
        </div>
        <button id="logout" class="w-full text-left px-2 py-2 text-zinc-400 hover:text-white">Log out</button>
      </div>
    </aside>`);
  sb.querySelectorAll("[data-nav]").forEach(b => b.addEventListener("click", () => navigate(b.dataset.nav)));
  $("#logout", sb).addEventListener("click", () => { Store.token = null; Store.user = null; render(); });
  return sb;
}

function StatCard(label, value, sub, accent=false) {
  return `
  <div class="glass rounded-2xl p-5">
    <div class="text-xs text-zinc-500 uppercase tracking-wider">${label}</div>
    <div class="text-3xl font-bold mt-2 ${accent ? "text-accent-400" : "text-white"}">${value}</div>
    ${sub ? `<div class="text-xs text-zinc-500 mt-1">${sub}</div>` : ""}
  </div>`;
}

async function DashboardView() {
  const wrap = h(`<div class="flex min-h-screen"></div>`);
  wrap.appendChild(Sidebar("dashboard"));
  const main = h(`<main class="flex-1 p-8 overflow-auto"><div class="flex items-center justify-between mb-8"><div><div class="text-xs text-zinc-500 uppercase tracking-wider">Overview</div><h1 class="text-2xl font-bold mt-1">Dashboard</h1></div></div><div id="content" class="space-y-6"><div class="text-zinc-500 text-sm">Loading…</div></div></main>`);
  wrap.appendChild(main);

  try {
    const [stats, agents, recent] = await Promise.all([
      api("/dashboard/stats"),
      api("/agents/list"),
      api("/calls/recent"),
    ]);
    const activeCount = (agents.agents || []).filter(a => a.is_active).length;
    const content = $("#content", main);
    content.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        ${StatCard("Calls today", stats.calls_today ?? 0, `${stats.calls_total ?? 0} all-time`)}
        ${StatCard("Bookings", stats.bookings ?? 0, "from AI conversations", true)}
        ${StatCard("Urgent", stats.urgent_calls ?? 0, "flagged for follow-up")}
        ${StatCard("Active agents", activeCount, `${agents.agents?.length ?? 0} total`)}
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="glass rounded-2xl p-5 lg:col-span-2">
          <div class="flex items-center justify-between mb-4">
            <div class="font-semibold">Recent Calls</div>
            <button data-nav="calls" class="text-xs text-accent-400 hover:text-accent-500">View all</button>
          </div>
          <div id="recent-list" class="divide-y divide-ink-800"></div>
        </div>
        <div class="glass rounded-2xl p-5">
          <div class="font-semibold mb-4">Your Agents</div>
          <div id="agents-list" class="space-y-2"></div>
        </div>
      </div>`;
    content.querySelector("[data-nav]").addEventListener("click", () => navigate("calls"));
    renderRecentList($("#recent-list", content), recent.calls || []);
    renderAgentsList($("#agents-list", content), agents.agents || [], { compact: true });
  } catch (e) {
    $("#content", main).innerHTML = `<div class="text-red-400 text-sm">Failed to load: ${e.message}</div>`;
  }
  return wrap;
}

function renderRecentList(el, calls) {
  if (!calls.length) { el.innerHTML = `<div class="text-sm text-zinc-500 py-6 text-center">No calls yet. Forward your business number to your Twilio number to get started.</div>`; return; }
  el.innerHTML = calls.map(c => `
    <button data-call="${c.id}" class="w-full text-left py-3 flex items-center gap-3 hover:bg-ink-850 px-2 rounded-lg">
      <div class="w-2 h-2 rounded-full ${c.is_urgent ? "bg-red-500 pulse-dot" : c.booking_made ? "bg-accent-500" : "bg-zinc-600"}"></div>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">${c.caller_number || "Unknown caller"}</div>
        <div class="text-xs text-zinc-500">${c.created_at ? new Date(c.created_at).toLocaleString() : ""}${c.is_urgent ? " · Urgent" : ""}${c.booking_made ? " · Booking made" : ""}</div>
      </div>
      <div class="text-xs text-zinc-500">${c.status || ""}</div>
    </button>`).join("");
  el.querySelectorAll("[data-call]").forEach(b => b.addEventListener("click", () => navigate("call", { id: b.dataset.call })));
}

function renderAgentsList(el, agents, opts={}) {
  if (!agents.length) { el.innerHTML = `<button id="new-agent" class="w-full py-3 rounded-lg border border-dashed border-ink-700 text-sm text-zinc-400 hover:text-white hover:border-accent-500">+ Create your first agent</button>`; el.querySelector("#new-agent").addEventListener("click", () => navigate("agent-new")); return; }
  el.innerHTML = agents.map(a => `
    <div class="flex items-center justify-between p-3 rounded-lg bg-ink-850/60 border border-ink-800">
      <div class="min-w-0">
        <div class="text-sm font-medium truncate">${escapeHtml(a.name)}</div>
        <div class="text-xs text-zinc-500 truncate">${escapeHtml(a.config?.business_name || "")} · ${escapeHtml(a.twilio_number || "no number")}</div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs ${a.is_active ? "text-accent-400" : "text-zinc-500"}">${a.is_active ? "● Live" : "○ Paused"}</span>
        ${opts.compact ? "" : `<button data-toggle="${a.id}" data-active="${a.is_active}" class="text-xs px-2 py-1 rounded bg-ink-800 hover:bg-ink-700">${a.is_active ? "Pause" : "Activate"}</button><button data-del="${a.id}" class="text-xs px-2 py-1 rounded text-red-400 hover:bg-red-500/10">Delete</button>`}
      </div>
    </div>`).join("") + (opts.compact ? `<button id="new-agent" class="w-full mt-2 py-2 rounded-lg border border-dashed border-ink-700 text-xs text-zinc-400 hover:text-white hover:border-accent-500">+ New agent</button>` : "");
  el.querySelectorAll("[data-toggle]").forEach(b => b.addEventListener("click", async () => {
    const active = b.dataset.active === "true";
    await api(`/agents/${b.dataset.toggle}/${active ? "deactivate" : "activate"}`, { method: "POST" });
    navigate("agents");
  }));
  el.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", async () => {
    if (!confirm("Delete this agent? This cannot be undone.")) return;
    await api(`/agents/${b.dataset.del}`, { method: "DELETE" });
    navigate("agents");
  }));
  const add = el.querySelector("#new-agent");
  if (add) add.addEventListener("click", () => navigate("agent-new"));
}

async function AgentsView() {
  const wrap = h(`<div class="flex min-h-screen"></div>`);
  wrap.appendChild(Sidebar("agents"));
  const main = h(`<main class="flex-1 p-8 overflow-auto"><div class="flex items-center justify-between mb-8"><div><div class="text-xs text-zinc-500 uppercase tracking-wider">Manage</div><h1 class="text-2xl font-bold mt-1">Agents</h1></div><button id="new" class="px-4 py-2 rounded-lg bg-accent-500 hover:bg-accent-600 text-ink-950 font-semibold text-sm">+ New agent</button></div><div id="content" class="space-y-3"><div class="text-zinc-500 text-sm">Loading…</div></div></main>`);
  wrap.appendChild(main);
  $("#new", main).addEventListener("click", () => navigate("agent-new"));
  try {
    const r = await api("/agents/list");
    renderAgentsList($("#content", main), r.agents || []);
  } catch (e) { $("#content", main).innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }
  return wrap;
}

async function CallsView() {
  const wrap = h(`<div class="flex min-h-screen"></div>`);
  wrap.appendChild(Sidebar("calls"));
  const main = h(`<main class="flex-1 p-8 overflow-auto"><div class="mb-8"><div class="text-xs text-zinc-500 uppercase tracking-wider">History</div><h1 class="text-2xl font-bold mt-1">Recent Calls</h1></div><div id="content" class="glass rounded-2xl p-3"></div></main>`);
  wrap.appendChild(main);
  try {
    const r = await api("/calls/recent");
    renderRecentList($("#content", main), r.calls || []);
  } catch (e) { $("#content", main).innerHTML = `<div class="text-red-400 text-sm p-4">${e.message}</div>`; }
  return wrap;
}

async function CallDetailView({ id }) {
  const wrap = h(`<div class="flex min-h-screen"></div>`);
  wrap.appendChild(Sidebar("calls"));
  const main = h(`<main class="flex-1 p-8 overflow-auto max-w-3xl"><button data-back class="text-xs text-zinc-500 hover:text-white mb-3">← Back to calls</button><div id="content"><div class="text-zinc-500 text-sm">Loading…</div></div></main>`);
  wrap.appendChild(main);
  main.querySelector("[data-back]").addEventListener("click", () => navigate("calls"));
  try {
    const c = await api(`/calls/${id}`);
    const badge = c.is_urgent ? `<span class="px-2 py-0.5 rounded-full bg-red-500/15 text-red-400 text-xs">Urgent</span>` : c.booking_made ? `<span class="px-2 py-0.5 rounded-full bg-accent-500/15 text-accent-400 text-xs">Booking made</span>` : `<span class="px-2 py-0.5 rounded-full bg-ink-700 text-zinc-400 text-xs">${c.status || "—"}</span>`;
    $("#content", main).innerHTML = `
      <div class="glass rounded-2xl p-6 mb-4">
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="text-xs text-zinc-500 uppercase tracking-wider">Call from</div>
            <div class="text-xl font-semibold mt-1">${c.caller_number || "Unknown"}</div>
          </div>
          ${badge}
        </div>
        <div class="grid grid-cols-3 gap-4 text-sm">
          <div><div class="text-xs text-zinc-500">When</div><div>${c.created_at ? new Date(c.created_at).toLocaleString() : "—"}</div></div>
          <div><div class="text-xs text-zinc-500">Duration</div><div>${c.duration_seconds || 0}s</div></div>
          <div><div class="text-xs text-zinc-500">Call SID</div><div class="font-mono text-xs truncate">${c.call_sid || "—"}</div></div>
        </div>
        ${c.booking_details ? `<div class="mt-4 p-3 rounded-lg bg-accent-500/10 border border-accent-500/30 text-sm"><div class="text-xs text-accent-400 mb-1">Booking</div><pre class="whitespace-pre-wrap text-xs">${escapeHtml(JSON.stringify(c.booking_details, null, 2))}</pre></div>` : ""}
      </div>
      <div class="glass rounded-2xl p-6">
        <div class="font-semibold mb-4">Transcript</div>
        <div class="space-y-3 scrollbar-thin">
          ${(c.conversation || []).map(t => `
            <div class="flex gap-3 ${t.role === "user" ? "" : "flex-row-reverse"}">
              <div class="w-8 h-8 shrink-0 rounded-full ${t.role === "user" ? "bg-ink-700 text-zinc-300" : "bg-accent-500 text-ink-950"} flex items-center justify-center text-xs font-bold">${t.role === "user" ? "C" : "AI"}</div>
              <div class="max-w-[75%] rounded-2xl px-4 py-2.5 text-sm ${t.role === "user" ? "bg-ink-800 text-zinc-100" : "bg-accent-500/10 text-accent-400 border border-accent-500/20"}">${escapeHtml(t.content || "")}</div>
            </div>`).join("") || `<div class="text-sm text-zinc-500">No transcript yet.</div>`}
        </div>
      </div>`;
  } catch (e) { $("#content", main).innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }
  return wrap;
}

function escapeHtml(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// --------- Router ---------
let route = { name: "dashboard", params: {} };
function navigate(name, params={}) { route = { name, params }; render(); }

async function render() {
  const root = $("#root");
  root.innerHTML = "";
  if (!Store.token) { root.appendChild(AuthView()); return; }
  let view;
  switch (route.name) {
    case "agents": view = await AgentsView(); break;
    case "agent-new": view = NewAgentView(); break;
    case "calls": view = await CallsView(); break;
    case "call": view = await CallDetailView(route.params); break;
    default: view = await DashboardView();
  }
  root.appendChild(view);
}

render();
</script>
</body>
</html>
